name: Claude Autofix
on:
  workflow_run:
    workflows: ["PR Build"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read
  id-token: write

concurrency:
  group: claude-autofix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  autofix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR head
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const pr = run.pull_requests?.[0];
            if (!pr) { core.setFailed('No PR linked to workflow_run'); return; }
            core.setOutput('number', pr.number);
            core.setOutput('head_ref', run.head_branch);
            core.setOutput('head_sha', run.head_sha);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - run: npm ci
        working-directory: client

      - name: Fetch failed job logs
        run: |
          mkdir -p .autofix
          gh run view ${{ github.event.workflow_run.id }} --log-failed > .autofix/failed.log 2>&1 || true
          tail -n 600 .autofix/failed.log > .autofix/failed.tail.log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Playwright report (if e2e failed)
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: .autofix/playwright-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
