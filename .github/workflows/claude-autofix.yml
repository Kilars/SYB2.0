name: Claude Autofix
on:
  workflow_run:
    workflows: ["PR Build"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: claude-autofix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  autofix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR head
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const pr = run.pull_requests?.[0];
            if (!pr) { core.setFailed('No PR linked to workflow_run'); return; }
            core.setOutput('number', pr.number);
            core.setOutput('head_ref', run.head_branch);
            core.setOutput('head_sha', run.head_sha);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - run: npm ci
        working-directory: client

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-opus-4-7 --max-turns 15'
          prompt: |
            PR #${{ steps.pr.outputs.number }} on branch `${{ steps.pr.outputs.head_ref }}` has a failing "PR Build" check (one or more of: frontend, backend, e2e).

            Your job: get the PR fully green so it can auto-merge. Authority is broad — fix the real problem wherever it is.

            Workflow:
            1. Run the failing check(s) locally to reproduce:
               - frontend: `cd client && npm run build`
               - backend: `dotnet build --configuration Release`
               - e2e: `cd e2e && npm test` (boots SQL Server via docker-compose if needed: `docker-compose up -d sql`)
            2. Diagnose the root cause. Be willing to fix:
               - Syntax / lint / typecheck errors in any source file
               - Broken application logic (controllers, handlers, components, hooks)
               - Genuinely stale or incorrect tests, when the test — not the code — is wrong
               - Missing migrations, broken seed data, or DI registration issues
            3. Prefer fixing the application code over fixing the test. If the test was correct and is now red because the code regressed, fix the code. Only edit a test if the test itself encodes wrong expectations.
            4. Re-run all three checks locally until each passes.
            5. Follow CLAUDE.md — layer order (Domain → Application → Persistence → Infrastructure → API → Frontend), the 5 domain invariants, no comments unless the WHY is non-obvious.
            6. Commit with a message that explains what failed and what you changed. Push to `${{ steps.pr.outputs.head_ref }}`.
            7. After pushing, enable auto-merge: `gh pr merge ${{ steps.pr.outputs.number }} --auto --squash`

            If you cannot determine a safe fix (ambiguous failure, multiple root causes, looks intentional), post a PR comment explaining what you found and stop — do not push speculative changes.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
